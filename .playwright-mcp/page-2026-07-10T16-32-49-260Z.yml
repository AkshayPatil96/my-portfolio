            - heading "Solving Multi-Tab Presence Consistency" [level=3] [ref=f1e147]
            - paragraph [ref=f1e148]: Each browser tab opens its own socket connection, so a naive approach would toggle users offline every time a single tab closes. Solved with Redis INCR/DECR counters per userId - only emitting 'user:offline' when the count drops to zero, paired with a 120s TTL heartbeat as a safety net.
          - generic [ref=f1e149]:
            - heading "Atomic Message + Conversation Updates" [level=3] [ref=f1e150]
            - paragraph [ref=f1e151]: Creating a message and updating the conversation's lastMessage field must succeed or fail together. Implemented a withTransaction() helper wrapping MongoDB sessions, ensuring atomic rollback on any failure - critical for the chat-request accept flow which creates a conversation and updates request status in one transaction.
          - generic [ref=f1e152]:
            - heading "Webhook Body Parsing Order" [level=3] [ref=f1e153]
            - paragraph [ref=f1e154]: Clerk webhooks require the raw request body for Svix HMAC signature verification, but Express.json() consumes it. Solved by registering webhook routes with express.raw() before any body-parsing middleware in the middleware chain.
