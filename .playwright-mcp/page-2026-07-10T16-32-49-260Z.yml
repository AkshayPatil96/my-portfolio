        - paragraph [ref=f1e56]: THE CHALLENGE
        - heading "Reliable Messaging at Concurrent Scale" [level=2] [ref=f1e57]
        - paragraph [ref=f1e58]: The core challenge wasn't just sending messages - it was guaranteeing ordering, delivery state consistency, and presence accuracy across multiple browser tabs and reconnection scenarios. Webhook signature verification required raw body preservation before Express middleware parsing. Atomic consistency between message creation and conversation metadata updates demanded careful transaction orchestration. Meanwhile, rate limiting had to be distributed across potential server instances without falling back to fragile in-memory stores.
