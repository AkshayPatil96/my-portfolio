          - heading "Cursor Pagination Internals" [level=3] [ref=f1e128]
          - paragraph [ref=f1e129]: "Each cursor encodes a base64 JSON of { createdAt, _id }. The query filters using a compound condition (createdAt < cursor OR createdAt = cursor AND _id < cursor._id) against a compound descending index, yielding stable reverse-chronological traversal immune to mid-scroll inserts."
