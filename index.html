<!doctype html>

<html
  class="dark"
  lang="en"
>
  <head>
    <meta charset="utf-8" />
    <meta
      content="width=device-width, initial-scale=1.0"
      name="viewport"
    />
    <link
      href="https://fonts.googleapis.com"
      rel="preconnect"
    />
    <link
      crossorigin=""
      href="https://fonts.gstatic.com"
      rel="preconnect"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&amp;family=Manrope:wght@400;500;600&amp;family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-tertiary-container": "#334259",
              "surface-dim": "#131313",
              "on-primary-container": "#533e1c",
              "on-primary": "#402d0c",
              "on-error-container": "#ffdad6",
              "inverse-on-surface": "#313030",
              "on-secondary": "#30312b",
              "primary-fixed-dim": "#e2c195",
              "on-surface": "#e5e2e1",
              error: "#ffb4ab",
              "surface-container-lowest": "#0e0e0e",
              "primary-fixed": "#ffddb0",
              "tertiary-fixed": "#d4e3ff",
              "secondary-fixed": "#e4e3d9",
              "surface-container": "#201f1f",
              "surface-container-low": "#1c1b1b",
              "inverse-primary": "#735a36",
              "on-tertiary-fixed-variant": "#38485e",
              "error-container": "#93000a",
              "secondary-fixed-dim": "#c8c7be",
              "surface-tint": "#e2c195",
              "outline-variant": "#4e453b",
              "surface-variant": "#353534",
              "on-tertiary": "#213147",
              "on-secondary-fixed": "#1b1c16",
              "tertiary-container": "#9fafca",
              secondary: "#c8c7be",
              "surface-container-high": "#2a2a2a",
              "on-secondary-container": "#b9b9b0",
              "tertiary-fixed-dim": "#b7c7e3",
              primary: "#e5c497",
              "secondary-container": "#494a43",
              "on-error": "#690005",
              "on-background": "#e5e2e1",
              background: "#131313",
              "on-primary-fixed-variant": "#594320",
              tertiary: "#bacae6",
              "surface-container-highest": "#353534",
              outline: "#9a8f83",
              "surface-bright": "#3a3939",
              "on-primary-fixed": "#281800",
              "inverse-surface": "#e5e2e1",
              "on-tertiary-fixed": "#0b1c31",
              surface: "#131313",
              "on-surface-variant": "#d1c5b7",
              "on-secondary-fixed-variant": "#474740",
              "primary-container": "#c8a97e",
            },
            fontFamily: {
              headline: ["Noto Serif"],
              body: ["Manrope"],
              label: ["Space Grotesk"],
            },
            borderRadius: {
              DEFAULT: "0.125rem",
              lg: "0.25rem",
              xl: "0.5rem",
              full: "0.75rem",
            },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      .ghost-border {
        border: 0.5px solid rgba(78, 69, 59, 0.2);
      }
      .glass-header {
        background: rgba(19, 19, 19, 0.8);
        backdrop-filter: blur(20px);
      }
    </style>
  </head>
  <body
    class="bg-background text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container"
  >
    <!-- Top Navigation Bar -->
    <nav class="fixed top-0 w-full z-50 glass-header">
      <div
        class="flex justify-between items-center px-12 py-6 max-w-[1920px] mx-auto"
      >
        <a
          class="text-2xl font-bold tracking-tighter text-[#c8a97e] font-headline"
          href="#"
          >akshay.dev</a
        >
        <div class="hidden md:flex items-center gap-12">
          <a
            class="text-on-surface-variant/70 hover:text-on-surface transition-colors font-label uppercase tracking-widest text-xs"
            href="#"
            >Exhibits</a
          >
          <a
            class="text-on-surface-variant/70 hover:text-on-surface transition-colors font-label uppercase tracking-widest text-xs"
            href="#"
            >Process</a
          >
          <a
            class="text-on-surface-variant/70 hover:text-on-surface transition-colors font-label uppercase tracking-widest text-xs"
            href="#"
            >Tech Stack</a
          >
          <a
            class="text-on-surface-variant/70 hover:text-on-surface transition-colors font-label uppercase tracking-widest text-xs"
            href="#"
            >Archive</a
          >
          <a
            class="text-on-surface-variant/70 hover:text-on-surface transition-colors font-label uppercase tracking-widest text-xs"
            href="#"
            >Contact</a
          >
        </div>
        <button
          class="bg-primary text-on-primary px-8 py-3 rounded-full font-label text-xs uppercase tracking-widest hover:scale-105 transition-transform duration-500 ease-out"
        >
          Hire Curator
        </button>
      </div>
    </nav>
    <!-- Main Content Canvas -->
    <main class="relative">
      <!-- Hero Section -->
      <section
        class="relative min-h-screen flex flex-col items-center justify-center overflow-hidden px-6"
      >
        <!-- Background Radial Glow -->
        <div
          class="absolute top-0 right-0 w-[800px] h-[800px] bg-primary-container/5 blur-[120px] rounded-full -mr-40 -mt-40"
        ></div>
        <!-- Hero Content -->
        <div class="relative z-10 text-center flex flex-col items-center">
          <!-- Overline Tag -->
          <span
            class="font-label text-xs md:text-sm uppercase tracking-[0.3em] text-primary mb-10 opacity-80"
          >
            Full Stack Developer · MERN · Next.js · AWS
          </span>
          <!-- Giant Display Heading -->
          <h1
            class="font-headline text-6xl md:text-8xl lg:text-[10rem] leading-[0.9] tracking-tighter mb-12 flex flex-col items-center"
          >
            <span class="block">Building things</span>
            <span class="block text-on-surface-variant/40 italic"
              >that scroll nicely.</span
            >
          </h1>
          <!-- Subtext -->
          <p
            class="font-body text-on-surface-variant max-w-xl text-lg md:text-xl font-light leading-relaxed mb-12"
          >
            Open to product-based roles · Relocating Pune mid-2026
          </p>
          <!-- CTA Cluster -->
          <div class="flex flex-col md:flex-row gap-6 items-center">
            <button
              class="px-10 py-4 bg-surface-container-high text-on-surface font-label text-sm uppercase tracking-widest rounded-full ghost-border hover:bg-surface-variant transition-all duration-300"
            >
              View Work →
            </button>
            <button
              class="px-10 py-4 bg-primary text-on-primary font-label text-sm uppercase tracking-widest rounded-full hover:scale-105 transition-transform duration-300"
            >
              Resume
            </button>
          </div>
        </div>
        <!-- Bottom Left Anchor: Availability -->
        <div class="absolute bottom-12 left-12 flex items-center gap-4">
          <div class="relative flex h-2 w-2">
            <span
              class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"
            ></span>
            <span
              class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"
            ></span>
          </div>
          <span
            class="font-label text-[10px] uppercase tracking-[0.2em] text-on-surface-variant"
            >Available for work</span
          >
        </div>
        <!-- Bottom Right Anchor: Scroll Indicator -->
        <div
          class="absolute bottom-12 right-12 flex flex-col items-center gap-6"
        >
          <span
            class="font-label text-[10px] uppercase tracking-[0.3em] text-on-surface-variant [writing-mode:vertical-lr] rotate-180"
            >scroll</span
          >
          <div class="w-[0.5px] h-24 bg-outline-variant/30"></div>
        </div>
        <!-- Visual Texture Element -->
      </section>
    </main>
  </body>
</html>
